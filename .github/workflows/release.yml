name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify release version
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Match tag and embedded versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const tag = process.env.RELEASE_TAG ?? '';
          const semver = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/;
          if (!semver.test(tag)) {
            throw new Error(`Release tag '${tag}' is not strict SemVer prefixed with v.`);
          }

          const expected = tag.slice(1);
          const cargo = fs.readFileSync('Cargo.toml', 'utf8');
          const cargoVersion = cargo
            .match(/\[workspace\.package\][\s\S]*?\nversion\s*=\s*"([^"]+)"/)?.[1];
          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          const tauriVersion = JSON.parse(
            fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')
          ).version;

          const versions = {
            'Cargo.toml workspace': cargoVersion,
            'package.json': packageVersion,
            'src-tauri/tauri.conf.json': tauriVersion,
          };
          for (const [source, version] of Object.entries(versions)) {
            if (version !== expected) {
              throw new Error(`${source} is '${version ?? '<missing>'}', expected '${expected}' from ${tag}.`);
            }
          }

          console.log(`Release tag and embedded versions all match ${expected}.`);
          NODE

  # ---------------------------------------------------------------------------
  # Create a draft release that every build job uploads its artifacts into.
  # ---------------------------------------------------------------------------
  create-release:
    name: Create draft release
    needs: verify-version
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v5

      - name: Create draft release
        id: create
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Baegun ${tag}`,
              draft: true,
              prerelease: tag.includes('-'),
              generate_release_notes: true,
            });
            return data.id;

  # ---------------------------------------------------------------------------
  # Desktop bundles: macOS (Apple Silicon + Intel), Linux, and Windows.
  # ---------------------------------------------------------------------------
  build-desktop:
    name: Desktop (${{ matrix.platform }} ${{ matrix.args }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        run: npm ci

      # Referencing an unconfigured secret yields an empty string, and the
      # Tauri bundler treats a set-but-empty APPLE_CERTIFICATE as "signing
      # requested" — `security import` then fails the whole build. Export the
      # signing variables only when they actually have values, so unsigned
      # builds work without any secrets configured.
      - name: Enable code signing when secrets are configured
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                      APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID \
                      TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            value="${!name}"
            if [ -n "$value" ]; then
              {
                echo "${name}<<__SIGNING_SECRET_EOF__"
                echo "$value"
                echo "__SIGNING_SECRET_EOF__"
              } >> "$GITHUB_ENV"
            fi
          done

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # Publish the release once every build job has finished successfully.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish release
    needs: [create-release, build-desktop]
    runs-on: ubuntu-22.04
    steps:
      - name: Mark release as published
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
