name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  frontend:
    name: Frontend (check & build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check)
        run: npm run check

      # `npm run build` chains `npm run verify` (svelte-check + cargo test),
      # so we invoke Vite directly here to keep this job to a pure frontend
      # build. The Rust suite runs in the `rust` job below.
      - name: Build frontend
        run: npx vite build

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri's desktop backend (src-tauri) links against the system webview
      # and GTK, so these are required to compile/clippy/test the workspace.
      # Tauri v2 uses the webkit2gtk 4.1 series.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # src-tauri embeds the built frontend via `generate_context!`, so the
      # `build/` directory must exist before any cargo command touches it.
      # We run Vite directly rather than `npm run build` (which would also run
      # cargo test) since the cargo steps below cover the workspace tests.
      - name: Build frontend (required by tauri::generate_context!)
        run: |
          npm ci
          npx vite build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
